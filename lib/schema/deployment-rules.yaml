# Deployment rules – Central mapping for Controller
#
# Defines which manifest paths trigger deployment and which can differ per environment.
# Controller uses this file (or equivalent) for deployment key computation and value merge.
# Schemas (application, external-system, external-datasource) remain clean; no x-* annotations.
#
# Semantics:
#   deployment.triggerPaths:   Change affects deployment key / requires deploy
#   deployment.overridablePaths: Value can differ per environment (preserve on promote)
#   certification.triggerPaths: Subset of 346.rules.md §17 — inputs to certification contract hash only
# A path may appear in both deployment trigger and overridable (e.g. authentication.endpoints).
#
# Path format: Dot notation. Child paths override parent when both match.
# Schema keys: application | externalSystem | externalDataSource

application:
  triggerPaths:
    - key
    - displayName
    - description
    - type
    - version
    - image
    - registryMode
    - port
    - requiresDatabase
    - databases
    - requiresRedis
    - requiresStorage
    - configuration
    - configuration.items
    - configuration.items.required
    - configuration.items.portalInput
    - healthCheck
    - healthCheck.path
    - healthCheck.probePath
    - healthCheck.probeRequestType
    - healthCheck.probeProtocol
    - frontDoorRouting
    - authentication
    - roles
    - permissions
    - repository
    - startupCommand
    - runtimeVersion
    - scaling
    - build
    - deployment
    - externalIntegration
  overridablePaths:
    - configuration.items.value
    - authentication.endpoints
    - healthCheck.interval
    - healthCheck.probeIntervalInSeconds

externalSystem:
  deployment:
    triggerPaths:
      - key
      - displayName
      - description
      - type
      - enabled
      - authentication
      - openapi
      - mcp
      - dataSources
      - configuration
      - configuration.items
      - tags
      - roles
      - permissions
      - endpoints
      - endpointsActive
      - generateMcpContract
      - generateOpenApiContract
    overridablePaths:
      - authentication.oauth2
      - authentication.apikey
      - authentication.basic
      - authentication.aad
      - openapi.specUrl
      - openapi.documentKey
      - mcp.serverUrl
      - mcp.toolPrefix
      - configuration.items.value
      - credentialIdOrKey
  certification:
    triggerPaths:
      - key
      - type
      - version
      - authentication
      - openapi
      - mcp
      - roles
      - permissions
      - generateMcpContract
      - generateOpenApiContract
      - configuration
      - configuration.items
      - endpoints
      - endpointsActive

externalDataSource:
  deployment:
    triggerPaths:
      - key
      - displayName
      - description
      - enabled
      - systemKey
      - entityType
      - resourceType
      - version
      - metadataSchema
      - fieldMappings
      - exposed
      - validation
      - quality
      - indexing
      - context
      - documentStorage
      - capabilities
      - execution
      - config
      - openapi
    overridablePaths:
      - sync
      - sync.mode
      - sync.schedule
      - sync.batchSize
      - sync.maxParallelRequests
      - openapi.baseUrl
      - openapi.resourcePath
  certification:
    triggerPaths:
      - key
      - systemKey
      - version
      - entityType
      - resourceType
      - metadataSchema
      - primaryKey
      - labelKey
      - foreignKeys
      - dimensions
      - fieldMappings
      - exposed
      - capabilities
      - openapi
      - execution
      - documentStorage
      - contract
      - config.extensions
