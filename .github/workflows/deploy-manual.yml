# Manual publish to NPM only; no build or tests. Use when you need to push the current version without CI.
name: Publish to NPM (manual, no tests)

# Run only from the Actions tab (workflow_dispatch). No push or PR triggers.
on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish to NPM (no tests)
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout only; no release creation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
